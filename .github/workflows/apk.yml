name: 📱 Build APK

# MANUAL ONLY — click "Run workflow" on GitHub Actions tab when ready
# No automatic builds on push — saves CI minutes
on:
  workflow_dispatch:
    inputs:
      release_note:
        description: 'What changed in this build?'
        required: false
        default: 'New build'

permissions:
  contents: write

jobs:
  build-apk:
    name: 📱 Build & Release Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        working-directory: zerotab-app
        run: flutter pub get

      - name: 🔨 Build release APK
        working-directory: zerotab-app
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SUPABASE_FUNCTIONS_URL=${{ secrets.SUPABASE_FUNCTIONS_URL }} \
            --dart-define=POSTHOG_KEY=

      - name: 📎 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerotab-release-${{ github.run_number }}
          path: zerotab-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "ZeroTab Build #${{ github.run_number }}"
          body: |
            ### 📱 Download APK
            Click **app-release.apk** below to install on your Android phone.

            **Note:** ${{ github.event.inputs.release_note }}
            **Commit:** `${{ github.sha }}`
          files: zerotab-app/build/app/outputs/flutter-apk/app-release.apk
