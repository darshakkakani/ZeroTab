name: 🚀 ZeroTab — Build APK + Deploy Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # ← lets you trigger manually from GitHub UI

# Allow GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Build release APK and attach to a GitHub Release
  # ─────────────────────────────────────────────────────────────
  build-apk:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 🐦 Set up Flutter 3.44.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        working-directory: zerotab-app
        run: flutter pub get

      - name: 🔨 Build release APK
        working-directory: zerotab-app
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SUPABASE_FUNCTIONS_URL=${{ secrets.SUPABASE_FUNCTIONS_URL }} \
            --dart-define=POSTHOG_KEY=

      # ── Upload APK as workflow artifact (always available) ──
      - name: 📎 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerotab-release-${{ github.sha }}
          path: zerotab-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

      # ── On push to main: create/update a GitHub Release with the APK ──
      - name: 🏷️ Create GitHub Release with APK
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} — ${{ github.event.head_commit.message }}"
          body: |
            ### 📱 Download APK
            Click **zerotab-release.apk** below to download and install on your Android phone.

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
          files: zerotab-app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Build Flutter web and deploy to GitHub Pages
  # ─────────────────────────────────────────────────────────────
  deploy-web:
    name: 🌐 Deploy Web to GitHub Pages
    runs-on: ubuntu-latest
    # Only deploy on push to main (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Set up Flutter 3.44.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        working-directory: zerotab-app
        run: flutter pub get

      - name: 🌐 Build Flutter Web

        working-directory: zerotab-app
        run: |
          flutter build web --release \
            --base-href /ZeroTab/ \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SUPABASE_FUNCTIONS_URL=${{ secrets.SUPABASE_FUNCTIONS_URL }} \
            --dart-define=POSTHOG_KEY=

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: zerotab-app/build/web
          commit_message: "deploy: build #${{ github.run_number }}"
